name: Update market data

on:
  schedule:
    - cron: "0 21 * * 1-5"   # 매 평일 UTC 21:00 (KST 06:00)
  workflow_dispatch:          # Actions 탭에서 수동 실행도 가능

permissions:
  contents: write             # macro.json 커밋을 위해 필요

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Fetch macro data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python pipeline/fetch_macro.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/macro.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: update macro.json ($(date -u +%Y-%m-%d))"
            git push
          fi
